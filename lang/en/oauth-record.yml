title: OAuth Authorizations
description: View OAuth authorization records and revoke authorizations
empty-title: No Authorizations
empty-desc: No third-party applications have been authorized to access your account
authorized-at: Authorized at
token-count: ":count active token(s)"
revoke: Revoke
confirm-revoke: Are you sure you want to revoke this authorization? The application will no longer be able to access your account data.
revoke-success: Authorization revoked successfully
revoke-fail: Failed to revoke authorization
token-not-found: Authorization record not found

config:
  title: Token Cleanup Settings
  auto-cleanup:
    title: Auto Cleanup Redundant Tokens
    label: Enable auto cleanup
    description: Keep only the latest active token per client and revoke the rest. Prevents accumulation of redundant tokens from repeated authorizations.
  clean-revoked:
    title: Auto Delete Revoked Tokens
    label: Enable auto delete
    description: Physically delete revoked tokens from the database when viewing authorization records, freeing up storage space.
  stats: "Revoked records in database: Access Token: :tokens, Refresh Token: :refresh, Auth Code: :codes"
