title: OAuth Authorization Records
plugin-title: OAuth Manager
description: View OAuth authorization records, revoke authorizations, and browse the OAuth app hall
empty-title: No Authorizations
empty-desc: No third-party applications have been authorized to access your account
authorized-at: Authorized at
token-count: ":count active token(s)"
revoke: Revoke
confirm-revoke: Are you sure you want to revoke this authorization? The application will no longer be able to access your account data.
revoke-success: Authorization revoked successfully
revoke-fail: Failed to revoke authorization
token-not-found: Authorization record not found
hall-title: OAuth App Hall
hall-empty-title: No Apps
hall-empty-desc: There are no OAuth applications available
hall-user-count: ":count user(s)"
hall-authorized: Authorized
hall-not-authorized: Not authorized
hall-creator: "By :name"

scopes:
  User_Read: Read user info
  Notification_Read: Read notifications
  Notification_ReadWrite: Read and write notifications
  Player_Read: Read player info
  Player_ReadWrite: Read and write player info
  Closet_Read: Read closet
  Closet_ReadWrite: Read and write closet
  UsersManagement_Read: Read user management
  UsersManagement_ReadWrite: Read and write user management
  PlayersManagement_Read: Read player management
  PlayersManagement_ReadWrite: Read and write player management
  ClosetManagement_Read: Read closet management
  ClosetManagement_ReadWrite: Read and write closet management
  ReportsManagement_Read: Read report management
  ReportsManagement_ReadWrite: Read and write report management
  openid: OpenID authentication
  profile: Basic profile
  email: Email address
  offline_access: Offline access
