title: OAuth 授权记录
description: 查看 OAuth 授权记录并取消授权
empty-title: 暂无授权记录
empty-desc: 没有第三方应用获得你的账户授权
authorized-at: 授权时间
token-count: ":count 个活跃令牌"
revoke: 取消授权
confirm-revoke: 确定要取消该应用的授权吗？该应用将无法再访问你的账户数据。
revoke-success: 已成功取消授权
revoke-fail: 取消授权失败
token-not-found: 未找到该授权记录

config:
  title: 令牌清理配置
  auto-cleanup:
    title: 自动清理冗余令牌
    label: 启用自动清理
    description: 同一客户端的多个活跃令牌仅保留最新一条，其余自动吊销。避免同一应用反复授权产生大量冗余令牌。
  clean-revoked:
    title: 自动删除已吊销令牌
    label: 启用自动删除
    description: 查看授权记录时自动从数据库中物理删除已吊销的令牌，释放存储空间。
  stats: "当前数据库中已吊销的记录：Access Token :tokens 条，Refresh Token :refresh 条，Auth Code :codes 条"
