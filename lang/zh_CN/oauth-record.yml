empty-title: 暂无授权记录
empty-desc: 没有第三方应用获得你的账户授权
authorized-at: 授权时间
token-count: ":count 个活跃令牌"
revoke: 取消授权
confirm-revoke: 确定要取消该应用的授权吗？该应用将无法再访问你的账户数据。
revoke-success: 已成功取消授权
revoke-fail: 取消授权失败
token-not-found: 未找到该授权记录
hall-title: OAuth 应用大厅
hall-empty-title: 暂无应用
hall-empty-desc: 当前没有可用的 OAuth 应用
hall-user-count: ":count 人使用"
hall-authorized: 已授权
hall-not-authorized: 未授权
hall-creator: "创建者: :name"

scopes:
  User_Read: 读取用户信息
  Notification_Read: 读取通知
